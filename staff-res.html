<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Recording Response</title>
</head>
<body style="margin:0;font-family:Arial,Helvetica,sans-serif;background:#f6f6f6;">
  <div id="message" style="max-width:500px;margin:80px auto;background:#ffffff;padding:30px;border:1px solid #e5e5e5;border-radius:8px;text-align:center;">
    <h2 style="margin-top:0;color:#333;">Please wait...</h2>
    <p style="color:#666;">Recording your response.</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const staffid = params.get("staffid");
    const email = params.get("email");
    const response = params.get("response");

    const messageBox = document.getElementById("message");

    if (!staffid || !response) {
      messageBox.innerHTML = `
        <h2 style="margin-top:0;color:#c62828;">Invalid link</h2>
        <p style="color:#666;">Missing required information.</p>
      `;
    } else {
      fetch("YOUR_POWER_AUTOMATE_HTTP_URL", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          staffid: staffid,
          email: email,
          response: response
        })
      })
      .then(response => {
        if (!response.ok) {
          throw new Error("Request failed");
        }
        return response.text();
      })
      .then(() => {
        messageBox.innerHTML = `
          <h2 style="margin-top:0;color:#2e7d32;">Thank you</h2>
          <p style="color:#666;">Your response has been recorded.</p>
          <p style="color:#999;font-size:13px;">You can close this page now.</p>
        `;
      })
      .catch(() => {
        messageBox.innerHTML = `
          <h2 style="margin-top:0;color:#c62828;">Something went wrong</h2>
          <p style="color:#666;">We could not record your response.</p>
          <p style="color:#999;font-size:13px;">Please try again or contact support.</p>
        `;
      });
    }
  </script>
</body>
</html>
